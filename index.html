<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Syazwina ❤️</title>

<style>
body {
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.card {
    background: rgba(255,255,255,0.15);
    padding:30px;
    border-radius:25px;
    backdrop-filter: blur(10px);
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    z-index:2;
    width:300px;
}

h1 {
    font-size:1.8em;
}

.photo {
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin:10px 0;
    box-shadow:0 0 15px white;
}

.heart {
    font-size:50px;
    animation: heartbeat 1.5s infinite;
}

#countdown{
    font-size:20px;
    margin:10px 0;
    font-weight:bold;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
}

.heart-float {
    position:absolute;
    color:white;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh) scale(0.5);}
    100% {transform: translateY(-10vh) scale(1.2);}
}

@keyframes heartbeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="card">
    <div class="heart">❤️</div>
    <h1>Happy Birthday Syazwina</h1>

    <!-- PHOTO -->
    <img src="syazwina.jpeg" class="photo">

    <!-- COUNTDOWN -->
    <div id="countdown"></div>

    <p>You are my happiness 💕</p>

    <button onclick="showMessage()">Open My Heart 💌</button>
</div>

<script>
// COUNTDOWN (set birthday date)
var countDate = new Date("August 31, 2026 00:00:00").getTime(); // CHANGE DATE

var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = countDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
  days + "d " + hours + "h " + minutes + "m " + seconds + "s";

  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "It's Your Day ❤️";
  }
}, 1000);

// floating hearts
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart-float");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove()},6000);
}
setInterval(createHeart,500);

function showMessage(){
    alert("Happy Birthday Syazwina ❤️ I love you forever.");
}
</script>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

</body>
</html>
